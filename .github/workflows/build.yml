name: Build Portable EXE

on: [push] # This triggers the build every time you save a change

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas openpyxl pymupdf pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole --name "Audit_Master_Pro" auditor_pro_v2.py

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: Audit-Tool-Windows
        path: dist/Audit_Master_Pro.exe
