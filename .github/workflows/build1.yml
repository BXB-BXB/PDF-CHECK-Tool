name: Build Auditor 11 Scratch
on: [push]

jobs:
  build_exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Libs
        run: pip install pymupdf pandas openpyxl pyinstaller
      - name: Create Tank 11
        # Aici e secretul: version-file trebuie sa fie legat de script
        run: |
          pyinstaller --noconsole --onefile --version-file="version_info.txt" --name="Audit_Master_Pro_BXB" auditor_11.py
      - uses: actions/upload-artifact@v4
        with:
          name: Auditor_PRO_BXB
          path: dist/Audit_Master_Pro_BXB.exe
