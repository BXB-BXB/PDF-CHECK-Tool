name: Build BOM Validator 2026 - Master Tank
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Checkout Cod din GitHub
        uses: actions/checkout@v4

      - name: 2. Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. Instalare Scule (Dependinte)
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf pandas openpyxl pyinstaller

      - name: 4. Identificare Tanc (Debug Info)
        run: ls  # Vedem in log-uri ce fisiere avem in folder

      - name: 5. Compilare EXE cu MetaData
        # Folosim filtrul auditor*.py ca sa prinda v11, v12, v13 etc.
        # Numele final al EXE-ului ramane fix ca sa stie toata lumea cine e "seful"
        run: |
          pyinstaller --noconsole --onefile --version-file="version_info.txt" --name="Audit_Master_Pro_BXB" auditor_pro_v11.py

      - name: 6. Salvare si Livrare EXE
        uses: actions/upload-artifact@v4
        with:
          name: Audit_Master_Pro_BXB
          path: dist/Audit_Master_Pro_BXB.exe
